ground:white;color:var(--deep);border-color:var(--line)}.danger{background:#7b2424;color:white}.section,.page{max-width:1180px;margin:0 auto;padding:70px 24px}.page h1{font-size:44px;margin:0 0 8px}.sub{font-size:18px;color:var(--muted);margin-bottom:34px}.three{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}.card,.post,.service,.crud,.box{background:rgba(255,250,246,.84);border:1px solid var(--line);border-radius:28px;padding:24px;box-shadow:var(--shadow)}.big{font-size:18px}.list{display:grid;gap:14px}.muted{color:var(--muted)}.designerBox{display:grid;grid-template-columns:54px minmax(260px,440px) 1fr 54px;gap:24px;align-items:center;background:rgba(255,250,246,.74);border:1px solid var(--line);border-radius:36px;padding:28px;box-shadow:var(--shadow)}.circle{width:54px;height:54px;border-radius:50%;border:0;background:white;color:var(--deep);box-shadow:var(--shadow)}.photo{height:520px;border-radius:28px;overflow:hidden;background:#dfc8b8;display:flex;align-items:center;justify-content:center;color:var(--muted);font-weight:900}.photo img{width:100%;height:100%;object-fit:cover}.designerInfo h2{font-size:56px;margin:0}.designerInfo h3{color:var(--brown)}.serviceGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:18px}.service span{font-weight:900;color:#9c705b}.service h2{font-size:25px}.narrow{max-width:720px}.form{display:grid;gap:14px}.form input,.form textarea,.form select,.single{width:100%;border:1px solid var(--line);border-radius:18px;padding:14px 16px;background:white;font:inherit}.form textarea{min-height:120px}.ok{color:#167a3e}.err{color:#b42318}.answer{background:#f2dfcf;border-radius:18px;padding:14px;margin-top:12px}.adminHead{display:flex;justify-content:space-between;align-items:center;gap:16px}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:20px 0}.tabs button{border:1px solid var(--line);background:white;border-radius:999px;padding:10px 16px;font-weight:900}.tabs button.active{background:var(--deep);color:w function esc(v){ return String(v ?? "").replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m])); }
function go(route){ location.hash = "#/" + route; render(); window.scrollTo(0,0); }
window.go = go;

function listen(name, fallback, cb){
  let q;
  try { q = query(collection(db, name), orderBy("order","asc")); }
  catch { q = collection(db, name); }
  return onSnapshot(q, snap => {
    const data = snap.docs.map(d => ({ id:d.id, ...d.data() }));
    cb(data.length ? data : fallback);
  }, err => { console.error(err); cb(fallback); });
}

function route(){ return location.hash.replace("#/","") || "home"; }
window.addEventListener("hashchange", render);

let unsub = [];
function clearSubs(){ unsub.forEach(fn => fn && fn()); unsub = []; }
function render(){
  clearSubs();
  const r = route();
  if(r==="home") return renderHome();
  if(r==="designers") return renderDesigners();
  if(r==="services") return renderServices();
  if(r==="foreign") return renderForeign();
  if(r==="qna") return renderQna();
  if(r==="signup") return renderSignup();
  if(r==="admin") return renderAdmin();
  renderHome();
}

  appEl.innerHTML = `<main class="page"><h1>디자이너 소개</h1><p class="sub">한 명씩 넘기며 전문 분야와 소개글을 확인할 수 있습니다.</p><div id="designerMount"></div></main>`;
  let idx = 0;
  unsub.push(listen("designers", fallbackDesigners, items => {
    items.sort((a,b)=>(a.order||0)-(b.order||0));
    function show(){
      const d = items[idx] || items[0];
      document.getElementById("designerMount").innerHTML = `<div class="designerBox">
        <button class="circle" id="prevD">‹</button>
        <div class="photo">${d.imageUrl ? `<img src="${esc(d.imageUrl)}" onerror="this.outerHTML='<span>사진 파일을 images 폴더에 넣어주세요</span>'">` : `<span>사진 준비중</span>`}</div>
        <div class="designerInfo">
          <p class="eyebrow brown">${esc(d.position)}</p><h2>${esc(d.name)}</h2><h3>${esc(d.specialty)}</h3><p>${esc(d.intro)}</p>
          <div class="row">${d.reservationUrl ? `<a class="primary" href="${esc(d.reservationUrl)}" target="_blank">예약하기</a>` : ""}${d.instagramUrl ? `<a class="ghost dark" href="${esc(d.instagramUrl)}" target="_blank">인스타그램</a>` : ""}</div>
          <small>${idx+1} / ${items.length}</small>
        </div>
        <button class="circle" id="nextD">›</button>
      </div>`;
      document.getElementById("prevD").onclick = () => { idx = (idx - 1 + items.length) % items.length; show(); };
      document.getElementById("nextD").onclick = () => { idx = (idx + 1) % items.length; show(); };
    }
    show();
  }));
}

  return `<select name="${name}">${imageOptions.map(p => `<option value="${p}">${p}</option>`).join("")}</select><p class="notice wide">사진은 Firebase Storage 없이 무료로 씁니다. GitHub의 images/designers 또는 images/gallery 폴더에 사진을 올린 뒤, 여기서 경로를 선택하거나 직접 입력하세요.</p><input name="${name}_custom" placeholder="직접 경로 입력 예: images/designers/hyejin.jpg">`;

function renderAdmin(){
  if(localStorage.getItem("adminOK") !== "yes"){
    appEl.innerHTML = `<main class="page narrow"><h1>관리자 로그인</h1><form class="form" id="adminLogin"><input name="id" placeholder="아이디"><input name="pw" type="password" placeholder="비밀번호"><button class="primary">로그인</button><p id="loginErr"></p></form></main>`;
    document.getElementById("adminLogin").onsubmit = e => {
      e.preventDefault();
      const fd = new FormData(e.target);
      if(fd.get("id") === ADMIN_ID && fd.get("pw") === ADMIN_PW){ localStorage.setItem("adminOK","yes"); renderAdmin(); }
      else document.getElementById("loginErr").innerHTML = `<span class="err">아이디 또는 비밀번호가 틀렸습니다.</span>`;
    };
    return;
  }
  appEl.innerHTML = `<main class="page admin"><div class="adminHead"><h1>관리자 모드</h1><button class="ghost dark" id="logout">로그아웃</button></div><div class="tabs"><button data-tab="designers" class="active">디자이너</button><button data-tab="services">시술</button><button data-tab="notices">공지</button><button data-tab="qna">Q&A</button><button data-tab="gallery">갤러리</button></div><div id="adminBody"></div></main>`;
  document.getElementById("logout").onclick = () => { localStorage.removeItem("adminOK"); renderAdmin(); };
  document.querySelectorAll(".tabs button").forEach(btn => btn.onclick = () => {
    document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    renderAdminTab(btn.dataset.tab);
  });
  renderAdminTab("designers");
}

  clearSubs();
  if(tab==="designers") return manageDesigners();
  if(tab==="services") return manageServices();
  if(tab==="notices") return manageNotices();
  if(tab==="qna") return manageQna();
  if(tab==="gallery") return manageGallery();
}

  return `<div class="list">${items.map(i => `<article class="post manage"><div>${i.imageUrl ? `<img class="mini" src="${esc(i.imageUrl)}">` : ""}<b>${esc(i.name || i.title)}</b><p>${esc(i.specialty || i.category || i.body || "")}</p></div><div class="row">${editFn ? `<button data-edit="${i.id}">수정</button>` : ""}<button class="danger" data-del="${i.id}">삭제</button></div></article>`).join("")}</div>`;
}

function manageDesigners(){
  const body = document.getElementById("adminBody");
  body.innerHTML = `<section class="crud"><h2>디자이너 추가/수정</h2><form class="form adminForm" id="designerForm"><input name="name" placeholder="이름" required><input name="position" placeholder="직급"><input name="specialty" placeholder="전문분야"><input name="order" type="number" placeholder="순서" value="1"><input name="reservationUrl" placeholder="예약 링크"><input name="instagramUrl" placeholder="인스타 링크"><textarea name="intro" placeholder="소개글"></textarea><div class="wide">${imageSelectHtml("imageUrl")}</div><button class="primary">저장</button></form><div id="designerList"></div></section>`;
  let editId = null;
  const form = document.getElementById("designerForm");
  form.onsubmit = async e => {
    e.preventDefault();
    const fd = new FormData(form);
    const data = Object.fromEntries(fd.entries());
    data.imageUrl = data.imageUrl_custom || data.imageUrl;
    delete data.imageUrl_custom;
    data.order = Number(data.order)||1; data.updatedAt = serverTimestamp();
    if(editId) await setDoc(doc(db,"designers",editId),data,{merge:true});
    else await addDoc(collection(db,"designers"), {...data, createdAt:serverTimestamp()});
    editId = null; form.reset();
  };
  unsub.push(listen("designers", [], items => {
    document.getElementById("designerList").innerHTML = adminList("designers", items, true);
    document.querySelectorAll("[data-del]").forEach(b=>b.onclick=()=>deleteDoc(doc(db,"designers",b.dataset.del)));
    document.querySelectorAll("[data-edit]").forEach(b=>b.onclick=()=>{
      const i = items.find(x=>x.id===b.dataset.edit); editId=i.id;
      ["name","position","specialty","order","reservationUrl","instagramUrl","intro"].forEach(k=>{ if(form[k]) form[k].value = i[k] || ""; });
      if(form.imageUrl) form.imageUrl.value = imageOptions.includes(i.imageUrl) ? i.imageUrl : imageOptions[0];
      if(form.imageUrl_custom) form.imageUrl_custom.value = imageOptions.includes(i.imageUrl) ? "" : (i.imageUrl||"");
    });
  }));
}

function manageServices(){
  const body = document.getElementById("adminBody");
  body.innerHTML = `<section class="crud"><h2>시술 추가/수정</h2><form class="form adminForm" id="serviceForm"><input name="category" placeholder="카테고리"><input name="title" placeholder="시술명"><input name="price" placeholder="가격"><input name="order" type="number" placeholder="순서" value="1"><textarea name="desc" placeholder="상세 설명"></textarea><button class="primary">저장</button></form><div id="serviceList"></div></section>`;
  let editId = null; const form = document.getElementById("serviceForm");
  form.onsubmit = async e => {
    e.preventDefault(); const fd = new FormData(form); const data = Object.fromEntries(fd.entries()); data.order=Number(data.order)||1;
    if(editId) await setDoc(doc(db,"services",editId),data,{merge:true}); else await addDoc(collection(db,"services"),data);
    editId = null; form.reset();
  };
  unsub.push(listen("services", [], items => {
    document.getElementById("serviceList").innerHTML = adminList("services", items, true);
    document.querySelectorAll("[data-del]").forEach(b=>b.onclick=()=>deleteDoc(doc(db,"services",b.dataset.del)));
    document.querySelectorAll("[data-edit]").forEach(b=>b.onclick=()=>{ const i=items.find(x=>x.id===b.dataset.edit); editId=i.id; ["category","title","price","order","desc"].forEach(k=>form[k].value=i[k]||""); });
  }));
}

function manageNotices(){
  const body = document.getElementById("adminBody");
  body.innerHTML = `<section class="crud"><h2>공지 작성</h2><form class="form adminForm" id="noticeForm"><input name="title" placeholder="제목"><textarea name="body" placeholder="내용"></textarea><button class="primary">등록</button></form><div id="noticeAdminList"></div></section>`;
  document.getElementById("noticeForm").onsubmit = async e => { e.preventDefault(); const fd=new FormData(e.target); await addDoc(collection(db,"notices"), {...Object.fromEntries(fd.entries()), order:Date.now(), createdAt:serverTimestamp()}); e.target.reset(); };
  unsub.push(listen("notices", [], items => {
    document.getElementById("noticeAdminList").innerHTML = adminList("notices", items, false);
    document.querySelectorAll("[data-del]").forEach(b=>b.onclick=()=>deleteDoc(doc(db,"notices",b.dataset.del)));
  }));
}

function manageQna(){
  const body = document.getElementById("adminBody");
  body.innerHTML = `<section class="crud"><h2>Q&A 답변 관리</h2><div id="qnaAdminList"></div></section>`;
  unsub.push(listen("qna", [], items => {
    document.getElementById("qnaAdminList").innerHTML = `<div class="list">${items.sort((a,b)=>(b.order||0)-(a.order||0)).map(i => `<article class="post"><b>${esc(i.title)}</b><small>${esc(i.name)} · ${esc(i.status||"대기")}</small><p>${esc(i.body)}</p><textarea data-answer="${i.id}" placeholder="답변">${esc(i.answer||"")}</textarea><button class="primary" data-save="${i.id}">답변 저장</button><button class="danger" data-del="${i.id}">삭제</button></article>`).join("")}</div>`;
    document.querySelectorAll("[data-save]").forEach(b=>b.onclick=async()=>{ const t=document.querySelector(`[data-answer="${b.dataset.save}"]`); await updateDoc(doc(db,"qna",b.dataset.save),{answer:t.value,status:"답변완료"}); });
    document.querySelectorAll("[data-del]").forEach(b=>b.onclick=()=>deleteDoc(doc(db,"qna",b.dataset.del)));
  }));
}

function manageGallery(){
  const body = document.getElementById("adminBody");
  body.innerHTML = `<section class="crud"><h2>갤러리 등록</h2><form class="form adminForm" id="galleryForm"><input name="title" placeholder="사진 제목"><div class="wide">${imageSelectHtml("imageUrl")}</div><button class="primary">갤러리 등록</button></form><div class="gallery" id="galleryList"></div></section>`;
  const form = document.getElementById("galleryForm");
  form.onsubmit = async e => {
    e.preventDefault();
    const fd = new FormData(form);
    const data = Object.fromEntries(fd.entries());
    data.imageUrl = data.imageUrl_custom || data.imageUrl;
    delete data.imageUrl_custom;
    await addDoc(collection(db,"gallery"), {title:data.title||"갤러리", imageUrl:data.imageUrl, order:Date.now(), createdAt:serverTimestamp()});
    form.reset();
  };
  unsub.push(listen("gallery", [], items => {
    document.getElementById("galleryList").innerHTML = items.map(i => `<div class="galleryItem"><img src="${esc(i.imageUrl)}"><b>${esc(i.title)}</b><button class="danger" data-del="${i.id}">삭제</button></div>`).join("");
    document.querySelectorAll("[data-del]").forEach(b=>b.onclick=()=>deleteDoc(doc(db,"gallery",b.dataset.del)));
  }));
}

render();
</script>
</body>
